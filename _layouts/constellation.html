---
layout: default
---
{%- assign constellation = site.data[site.compoundobjects-metadata] -%}
<div id="myplot"></div>
<script type="module">
import * as Plot from "https://cdn.jsdelivr.net/npm/@observablehq/plot@0.6/+esm"
var data = {{ constellation | jsonify }};

const plot = Plot.plot({
  height: 800,
  width: 2000,
  marginRight: 90,
  marginLeft: 100,
  grid: false,
  x: {nice: true},
  y: {inset: 5},
  color: {type: "categorical"},
  marks: [
    Plot.frame(),
    Plot.dot(data, {
      x: "startpage",
      y: "parentid",
      fy: "Anthology",
      stroke: "title","author",
      channels: {creator: "author", title: "title", date: "originally published", parentid: "anthology"},
      sort: {y: "x", fy: "x", reduce: "median", reverse: true},
      tip: true,
    }),
  ]
});
const div = document.querySelector("#myplot");
div.append(plot);
</script>
